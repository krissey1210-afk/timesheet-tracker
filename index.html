<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Timesheet Tracker</title>
<style>
  :root {
    --bg: #1a1a1e;
    --bg2: #24242a;
    --bg3: #2e2e36;
    --border: rgba(255,255,255,0.10);
    --border2: rgba(255,255,255,0.18);
    --text: #f0f0f2;
    --text2: #9090a0;
    --text3: #5a5a6a;
    --blue: #378ADD;
    --blue-dk: #185FA5;
    --green: #1D9E75;
    --green-dk: #3B6D11;
    --amber: #BA7517;
    --red: #A32D2D;
    --radius: 10px;
    --radius-sm: 6px;
    font-size: 14px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); min-height: 100vh; padding: 1.5rem; }
  .wrap { max-width: 560px; margin: 0 auto; display: flex; flex-direction: column; gap: 10px; }
  .card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 1rem 1.25rem; }
  .row { display: flex; align-items: center; gap: 8px; }
  .lbl { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: .08em; }
  .mono { font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; }
  .bar-wrap { height: 5px; background: var(--bg3); border-radius: 3px; overflow: hidden; margin: 6px 0 10px; }
  .bar-fill { height: 100%; border-radius: 3px; transition: width 1s linear; }
  .seg-group { border: 0.5px solid var(--border2); border-radius: var(--radius-sm); overflow: hidden; display: flex; }
  .seg-btn { background: transparent; border: none; padding: 6px 14px; cursor: pointer; font-size: 12px; font-family: inherit; color: var(--text2); transition: background .15s, color .15s; }
  .seg-btn.on { background: var(--bg3); color: var(--text); font-weight: 500; }
  .seg-btn:disabled { opacity: .4; cursor: default; }
  .tab-btn { background: transparent; border: 0.5px solid var(--border2); border-radius: var(--radius-sm); padding: 5px 14px; cursor: pointer; font-size: 12px; font-family: inherit; color: var(--text2); transition: background .15s; }
  .tab-btn.on { background: var(--bg3); color: var(--text); }
  .start-btn { background: var(--blue-dk); color: #fff; border: none; border-radius: var(--radius-sm); padding: 7px 22px; cursor: pointer; font-size: 13px; font-weight: 500; font-family: inherit; transition: opacity .15s; }
  .start-btn:hover { opacity: .9; }
  .stop-btn { background: var(--red); color: #fff; border: none; border-radius: var(--radius-sm); padding: 7px 22px; cursor: pointer; font-size: 13px; font-weight: 500; font-family: inherit; transition: opacity .15s; }
  .stop-btn:hover { opacity: .9; }
  .del-btn { background: transparent; border: 0.5px solid var(--border2); border-radius: var(--radius-sm); padding: 2px 8px; cursor: pointer; font-size: 12px; color: var(--text2); }
  .del-btn:hover { background: var(--bg3); }
  .cc-card { border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: .75rem; flex: 1; transition: border-color .2s, border-width .2s; }
  .sess-row { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-top: 0.5px solid var(--border); }
  input[type=text], input[type=number] { background: var(--bg3); border: 0.5px solid var(--border2); border-radius: var(--radius-sm); padding: 5px 9px; font-size: 13px; color: var(--text); font-family: inherit; outline: none; }
  input[type=text]:focus, input[type=number]:focus { border-color: var(--blue); }
  h1 { font-size: 17px; font-weight: 500; }
  .dot-live { width: 7px; height: 7px; border-radius: 50%; background: #3B6D11; display: inline-block; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
</style>
</head>
<body>
<div class="wrap" id="app">

  <div class="row" style="justify-content:space-between">
    <div>
      <h1 id="date-hdr"></h1>
      <div class="mono" style="font-size:12px;color:var(--text2);margin-top:3px" id="summary-line"></div>
    </div>
    <button class="tab-btn" onclick="toggleSettings()" id="set-btn">settings</button>
  </div>

  <div class="card" id="settings-panel" style="display:none;flex-direction:column;gap:10px">
    <div style="font-size:13px;font-weight:500">Settings</div>
    <div class="row"><span class="lbl" style="min-width:64px">code 1</span><input type="text" id="cc1-name" style="flex:1" oninput="saveCodes()" placeholder="Charge Code 1" /></div>
    <div class="row"><span class="lbl" style="min-width:64px">code 2</span><input type="text" id="cc2-name" style="flex:1" oninput="saveCodes()" placeholder="Charge Code 2" /></div>
    <div class="row"><span class="lbl" style="min-width:64px">daily</span><input type="number" id="daily-tgt" min="1" max="24" step="0.5" style="width:70px" oninput="saveCfg()" /><span style="font-size:12px;color:var(--text2)">hours</span></div>
    <div class="row"><span class="lbl" style="min-width:64px">monthly</span><input type="number" id="monthly-tgt" min="1" max="400" style="width:70px" oninput="saveCfg()" /><span style="font-size:12px;color:var(--text2)">hours</span></div>
    <div style="border-top:0.5px solid var(--border);padding-top:10px">
      <button class="tab-btn" onclick="clearData()" style="color:#f09595;border-color:#791F1F">clear all data</button>
    </div>
  </div>

  <div class="card">
    <div class="row" style="justify-content:space-between;margin-bottom:3px">
      <span class="lbl" id="daily-lbl">today — 8h target</span>
      <span class="mono" style="font-size:12px;color:var(--text2)" id="daily-extra"></span>
    </div>
    <div class="bar-wrap"><div class="bar-fill" id="daily-bar" style="background:var(--blue);width:0%"></div></div>
    <div style="display:flex;gap:8px">
      <div class="cc-card" id="c1-today-card">
        <div style="font-size:11px;color:var(--text2);margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" id="c1-today-name">Code 1</div>
        <div class="mono" style="font-size:22px;font-weight:500;color:var(--blue)" id="c1-today-val">0h 00m</div>
        <div style="font-size:11px;color:var(--text2)" id="c1-today-pct">0.00h · 0%</div>
      </div>
      <div class="cc-card" id="c2-today-card">
        <div style="font-size:11px;color:var(--text2);margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" id="c2-today-name">Code 2</div>
        <div class="mono" style="font-size:22px;font-weight:500;color:var(--green)" id="c2-today-val">0h 00m</div>
        <div style="font-size:11px;color:var(--text2)" id="c2-today-pct">0.00h · 0%</div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="row" style="justify-content:space-between;margin-bottom:8px">
      <span class="lbl">log session</span>
      <span class="mono" style="font-size:22px;font-weight:500;color:var(--amber);display:none" id="timer-disp">0:00:00</span>
    </div>
    <div class="row" style="flex-wrap:wrap;gap:6px">
      <div class="seg-group">
        <button class="seg-btn on" id="loc-office" onclick="selLoc('office')">office</button>
        <button class="seg-btn" id="loc-home" onclick="selLoc('home')">home</button>
      </div>
      <div class="seg-group" style="flex:1;min-width:120px">
        <button class="seg-btn on" id="cc-btn-c1" onclick="selCC('c1')" style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">Code 1</button>
        <button class="seg-btn" id="cc-btn-c2" onclick="selCC('c2')" style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">Code 2</button>
      </div>
      <button class="start-btn" id="main-btn" onclick="toggleTimer()">start</button>
    </div>
    <div style="margin-top:6px;font-size:12px;color:var(--text2);display:none" id="logging-note"></div>
    <div style="margin-top:10px;border-top:0.5px solid var(--border);padding-top:10px">
      <button class="tab-btn" onclick="toggleManual()" id="manual-toggle-btn" style="font-size:11px;padding:3px 10px">+ add past session</button>
      <div id="manual-form" style="display:none;margin-top:10px;flex-direction:column;gap:8px">
        <div class="row" style="gap:8px;flex-wrap:wrap;align-items:flex-end">
          <div style="display:flex;flex-direction:column;gap:3px">
            <span class="lbl">date</span>
            <input type="date" id="manual-date" style="font-size:13px;padding:4px 8px" />
          </div>
          <div style="display:flex;flex-direction:column;gap:3px">
            <span class="lbl">start</span>
            <input type="time" id="manual-start" style="width:110px;font-size:13px;padding:4px 8px" />
          </div>
          <div style="display:flex;flex-direction:column;gap:3px">
            <span class="lbl">end</span>
            <input type="time" id="manual-end" style="width:110px;font-size:13px;padding:4px 8px" />
          </div>
          <div style="display:flex;flex-direction:column;gap:3px">
            <span class="lbl">code</span>
            <div class="seg-group">
              <button class="seg-btn on" id="man-cc-c1" onclick="selManCC('c1')" style="padding:4px 10px">Code 1</button>
              <button class="seg-btn" id="man-cc-c2" onclick="selManCC('c2')" style="padding:4px 10px">Code 2</button>
            </div>
          </div>
          <div style="display:flex;flex-direction:column;gap:3px">
            <span class="lbl">location</span>
            <div class="seg-group">
              <button class="seg-btn on" id="man-loc-office" onclick="selManLoc('office')" style="padding:4px 10px">office</button>
              <button class="seg-btn" id="man-loc-home" onclick="selManLoc('home')" style="padding:4px 10px">home</button>
            </div>
          </div>
        </div>
        <div class="row" style="gap:8px">
          <button class="start-btn" onclick="addManual()" style="padding:5px 16px;font-size:12px">add session</button>
          <span id="manual-err" style="font-size:12px;color:#f09595;display:none"></span>
        </div>
      </div>
    </div>
  </div>

  <div class="row" style="gap:6px">
    <button class="tab-btn on" id="tab-today" onclick="switchTab('today')">today</button>
    <button class="tab-btn" id="tab-month" onclick="switchTab('month')">month</button>
    <span class="mono" style="font-size:11px;color:var(--text2);margin-left:auto" id="tab-info"></span>
  </div>

  <div id="today-view" style="display:flex;flex-direction:column;gap:5px"></div>
  <div id="month-view" style="display:none;flex-direction:column;gap:5px"></div>

</div>
<script>
var S = {
  codes: [{id:'c1',name:'Charge Code 1'},{id:'c2',name:'Charge Code 2'}],
  sessions: [],
  cfg: {daily:8, monthly:160}
};
var active=null, elapsed=0, iv=null, curLoc='office', curCC='c1', curTab='today', showSettings=false;

function fmt(s){return Math.floor(s/3600)+':'+pad(Math.floor((s%3600)/60))+':'+pad(s%60)}
function fmtHM(s){return Math.floor(s/3600)+'h '+pad(Math.floor((s%3600)/60))+'m'}
function fmtDec(s){return (s/3600).toFixed(2)+'h'}
function pad(n){return String(n).padStart(2,'0')}
function today(){return new Date().toISOString().split('T')[0]}
function month(){return today().substring(0,7)}
function ccName(id){return (S.codes.find(c=>c.id===id)||{name:id}).name}
function ccColor(id){return id==='c1'?'var(--blue)':'var(--green)'}

function load(){
  try{var c=localStorage.getItem('ts-codes');if(c)S.codes=JSON.parse(c);}catch(e){}
  try{var s=localStorage.getItem('ts-sessions');if(s)S.sessions=JSON.parse(s);}catch(e){}
  try{var cf=localStorage.getItem('ts-cfg');if(cf)S.cfg=JSON.parse(cf);}catch(e){}
  try{
    var a=localStorage.getItem('ts-active');
    if(a){
      var p=JSON.parse(a);
      if(new Date(p.t0).toISOString().split('T')[0]===today()){
        active=p; elapsed=Math.floor((Date.now()-p.t0)/1000);
      } else { localStorage.removeItem('ts-active'); }
    }
  }catch(e){}
  initUI();
  if(active) startTick();
  render();
}

function initUI(){
  document.getElementById('cc1-name').value=S.codes[0].name;
  document.getElementById('cc2-name').value=S.codes[1].name;
  document.getElementById('daily-tgt').value=S.cfg.daily;
  document.getElementById('monthly-tgt').value=S.cfg.monthly;
  document.getElementById('cc-btn-c1').textContent=S.codes[0].name;
  document.getElementById('cc-btn-c2').textContent=S.codes[1].name;
  document.getElementById('date-hdr').textContent=new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
}

function saveCodes(){
  S.codes[0].name=document.getElementById('cc1-name').value||'Code 1';
  S.codes[1].name=document.getElementById('cc2-name').value||'Code 2';
  document.getElementById('cc-btn-c1').textContent=S.codes[0].name;
  document.getElementById('cc-btn-c2').textContent=S.codes[1].name;
  localStorage.setItem('ts-codes',JSON.stringify(S.codes));
  render();
}
function saveCfg(){
  S.cfg.daily=parseFloat(document.getElementById('daily-tgt').value)||8;
  S.cfg.monthly=parseFloat(document.getElementById('monthly-tgt').value)||160;
  localStorage.setItem('ts-cfg',JSON.stringify(S.cfg));
  render();
}
function checkOverlap(t0, t1, excludeId, dateOverride){
  var td=dateOverride||today();
  var sessList=S.sessions.filter(function(s){return s.date===td && s.id!==excludeId;});
  for(var i=0;i<sessList.length;i++){
    var s=sessList[i];
    // Parse stored start/end times back to ms for today
    var base=td+'T';
    var sStart=parseTimeToMs(s.start);
    var sEnd=parseTimeToMs(s.end);
    if(sStart===null||sEnd===null)continue;
    // Overlap if not (t1<=sStart || t0>=sEnd)
    if(!(t1<=sStart||t0>=sEnd)){return s;}
  }
  return null;
}
function parseTimeToMs(timeStr){
  // Parse "07:20 AM" or "07:20" format to ms timestamp for today
  if(!timeStr)return null;
  var td=today();
  // Try HH:MM AM/PM format
  var m=timeStr.match(/(\d+):(\d+)\s*(AM|PM)?/i);
  if(!m)return null;
  var h=parseInt(m[1]),mn=parseInt(m[2]),ampm=m[3];
  if(ampm){
    if(ampm.toUpperCase()==='PM'&&h!==12)h+=12;
    if(ampm.toUpperCase()==='AM'&&h===12)h=0;
  }
  return new Date(td+'T'+String(h).padStart(2,'0')+':'+String(mn).padStart(2,'0')+':00').getTime();
}
function toggleSettings(){
  showSettings=!showSettings;
  document.getElementById('settings-panel').style.display=showSettings?'flex':'none';
  document.getElementById('set-btn').textContent=showSettings?'done':'settings';
}

var manCC='c1', manLoc='office', showManual=false;
function toggleManual(){
  showManual=!showManual;
  var f=document.getElementById('manual-form');
  f.style.display=showManual?'flex':'none';
  document.getElementById('manual-toggle-btn').textContent=showManual?'- cancel':'+ add past session';
  if(showManual){
    // pre-fill end time as now, start as blank
    var now=new Date();
    var hh=String(now.getHours()).padStart(2,'0');
    var mm=String(now.getMinutes()).padStart(2,'0');
    document.getElementById('manual-end').value=hh+':'+mm;
    document.getElementById('manual-start').value='';
    document.getElementById('manual-date').value=today();
    document.getElementById('manual-err').style.display='none';
    // update code button labels to match current names
    document.getElementById('man-cc-c1').textContent=S.codes[0].name;
    document.getElementById('man-cc-c2').textContent=S.codes[1].name;
  }
}
function selManCC(v){
  manCC=v;
  document.getElementById('man-cc-c1').className='seg-btn'+(v==='c1'?' on':'');
  document.getElementById('man-cc-c2').className='seg-btn'+(v==='c2'?' on':'');
}
function selManLoc(v){
  manLoc=v;
  document.getElementById('man-loc-office').className='seg-btn'+(v==='office'?' on':'');
  document.getElementById('man-loc-home').className='seg-btn'+(v==='home'?' on':'');
}
function addManual(){
  var dateVal=document.getElementById('manual-date').value;
  var startVal=document.getElementById('manual-start').value;
  var endVal=document.getElementById('manual-end').value;
  var errEl=document.getElementById('manual-err');
  if(!dateVal){errEl.textContent='Please select a date.';errEl.style.display='block';return;}
  if(!startVal||!endVal){errEl.textContent='Please enter both start and end times.';errEl.style.display='block';return;}
  var base=dateVal+'T';
  var t0=new Date(base+startVal).getTime();
  var t1=new Date(base+endVal).getTime();
  if(isNaN(t0)||isNaN(t1)){errEl.textContent='Invalid time format.';errEl.style.display='block';return;}
  if(t1<=t0){errEl.textContent='End time must be after start time.';errEl.style.display='block';return;}
  var dur=Math.floor((t1-t0)/1000);
  if(dur<60){errEl.textContent='Session must be at least 1 minute.';errEl.style.display='block';return;}
  var overlap=checkOverlap(t0,t1,null,dateVal);
  if(overlap){
    errEl.textContent='Overlaps with existing session: '+overlap.start+' – '+overlap.end+' ('+ccName(overlap.cc)+')';
    errEl.style.display='block';
    return;
  }
  var fmt12=function(t){return new Date(t).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});};
  var s={id:Date.now()+'',date:dateVal,start:fmt12(t0),end:fmt12(t1),dur:dur,cc:manCC,loc:manLoc};
  S.sessions.push(s);
  localStorage.setItem('ts-sessions',JSON.stringify(S.sessions));
  errEl.style.display='none';
  showManual=false;
  document.getElementById('manual-form').style.display='none';
  document.getElementById('manual-toggle-btn').textContent='+ add past session';
  render();
}
function clearData(){
  if(!confirm('Clear all session data? This cannot be undone.'))return;
  S.sessions=[]; active=null; elapsed=0;
  clearInterval(iv); iv=null;
  localStorage.removeItem('ts-sessions');
  localStorage.removeItem('ts-active');
  render();
}
function selLoc(v){
  curLoc=v;
  document.getElementById('loc-office').className='seg-btn'+(v==='office'?' on':'');
  document.getElementById('loc-home').className='seg-btn'+(v==='home'?' on':'');
}
function selCC(v){
  if(active)return;
  curCC=v;
  document.getElementById('cc-btn-c1').className='seg-btn'+(v==='c1'?' on':'');
  document.getElementById('cc-btn-c2').className='seg-btn'+(v==='c2'?' on':'');
}
function startTick(){
  if(iv)clearInterval(iv);
  iv=setInterval(function(){elapsed=Math.floor((Date.now()-active.t0)/1000);render();},1000);
}
function toggleTimer(){
  if(!active){
    active={cc:curCC,loc:curLoc,t0:Date.now()};
    elapsed=0;
    localStorage.setItem('ts-active',JSON.stringify(active));
    startTick();
  } else {
    clearInterval(iv); iv=null;
    var dur=Math.floor((Date.now()-active.t0)/1000);
    if(dur>=60){
      var t0ms=active.t0;
      var t1ms=Date.now();
      var overlap=checkOverlap(t0ms,t1ms,null);
      if(overlap){
        if(!confirm('This session overlaps with: '+overlap.start+' – '+overlap.end+' ('+ccName(overlap.cc)+'). Save anyway?')){
          // don't save but do stop the timer
          localStorage.removeItem('ts-active');
          active=null; elapsed=0;
          render();
          return;
        }
      }
      var s={
        id:Date.now()+'', date:today(),
        start:new Date(active.t0).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}),
        end:new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}),
        dur:dur, cc:active.cc, loc:active.loc
      };
      S.sessions.push(s);
      localStorage.setItem('ts-sessions',JSON.stringify(S.sessions));
    }
    localStorage.removeItem('ts-active');
    active=null; elapsed=0;
  }
  render();
}
function delSession(id){
  S.sessions=S.sessions.filter(function(s){return s.id!==id;});
  localStorage.setItem('ts-sessions',JSON.stringify(S.sessions));
  render();
}
function switchTab(t){
  curTab=t;
  document.getElementById('tab-today').className='tab-btn'+(t==='today'?' on':'');
  document.getElementById('tab-month').className='tab-btn'+(t==='month'?' on':'');
  document.getElementById('today-view').style.display=t==='today'?'flex':'none';
  document.getElementById('month-view').style.display=t==='month'?'flex':'none';
  render();
}
function ccSecs(id,list){
  return list.reduce(function(a,s){return a+(s.cc===id?s.dur:0);},0)+(active&&active.cc===id?elapsed:0);
}
function render(){
  var td=today(), mo=month();
  var todaySess=S.sessions.filter(function(s){return s.date===td;});
  var monthSess=S.sessions.filter(function(s){return s.date.startsWith(mo);});
  var act=active?elapsed:0;
  var dTot=todaySess.reduce(function(a,s){return a+s.dur;},0)+act;
  var mTot=monthSess.reduce(function(a,s){return a+s.dur;},0)+act;
  var dTgt=S.cfg.daily*3600, mTgt=S.cfg.monthly*3600;
  var dPct=Math.min(100,(dTot/dTgt)*100);
  var mPct=Math.min(100,(mTot/mTgt)*100);
  var dExtra=dTot-dTgt, mExtra=mTot-mTgt;

  document.getElementById('summary-line').textContent=fmtHM(dTot)+' today  ·  '+fmtHM(mTot)+' this month';
  document.getElementById('daily-lbl').textContent='today — '+S.cfg.daily+'h target';
  document.getElementById('daily-bar').style.width=dPct+'%';
  document.getElementById('daily-bar').style.background=dExtra>0?'var(--green-dk)':'var(--blue)';
  document.getElementById('daily-extra').textContent=dExtra>0?'+'+fmtHM(dExtra)+' extra':fmtHM(Math.max(0,dTgt-dTot))+' left';
  document.getElementById('daily-extra').style.color=dExtra>0?'var(--green)':'var(--text2)';

  ['c1','c2'].forEach(function(id,i){
    var tot=ccSecs(id,todaySess);
    var isAct=active&&active.cc===id;
    var col=ccColor(id);
    document.getElementById(id+'-today-name').textContent=S.codes[i].name;
    document.getElementById(id+'-today-val').textContent=fmtHM(tot);
    document.getElementById(id+'-today-pct').textContent=fmtDec(tot)+' · '+Math.round((tot/dTgt)*100)+'%';
    var card=document.getElementById(id+'-today-card');
    card.style.borderColor=isAct?(id==='c1'?'#378ADD':'#1D9E75'):'var(--border)';
    card.style.borderWidth=isAct?'1px':'0.5px';
  });

  if(active){
    document.getElementById('timer-disp').style.display='block';
    document.getElementById('timer-disp').textContent=fmt(elapsed);
    document.getElementById('logging-note').style.display='block';
    document.getElementById('logging-note').innerHTML='<span class="dot-live"></span> logging to <strong>'+ccName(active.cc)+'</strong> · '+active.loc;
    document.getElementById('main-btn').textContent='stop';
    document.getElementById('main-btn').className='stop-btn';
    ['cc-btn-c1','cc-btn-c2','loc-office','loc-home'].forEach(function(id){document.getElementById(id).disabled=true;});
  } else {
    document.getElementById('timer-disp').style.display='none';
    document.getElementById('logging-note').style.display='none';
    document.getElementById('main-btn').textContent='start';
    document.getElementById('main-btn').className='start-btn';
    ['cc-btn-c1','cc-btn-c2','loc-office','loc-home'].forEach(function(id){document.getElementById(id).disabled=false;});
  }

  if(curTab==='today'){
    document.getElementById('tab-info').textContent=todaySess.length+' session'+(todaySess.length!==1?'s':'');
    var tv=document.getElementById('today-view');
    if(todaySess.length===0){
      tv.innerHTML='<div class="card" style="text-align:center;font-size:13px;color:var(--text2);padding:1.5rem">no sessions logged today yet</div>';
    } else {
      tv.innerHTML=todaySess.map(function(s){
        var col=s.cc==='c1'?'#378ADD':'#1D9E75';
        return '<div class="card row" style="padding:.65rem 1rem;gap:8px">'+
          '<div style="width:3px;height:26px;border-radius:2px;background:'+col+';flex-shrink:0"></div>'+
          '<div style="flex:1;min-width:0">'+
            '<div style="font-size:12px;font-weight:500;color:'+col+';overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+ccName(s.cc)+'</div>'+
            '<div style="font-size:11px;color:var(--text2)">'+s.start+' – '+s.end+' · '+s.loc+'</div>'+
          '</div>'+
          '<span class="mono" style="font-size:13px">'+fmtHM(s.dur)+'</span>'+
          '<button class="del-btn" onclick="delSession(\''+s.id+'\')">×</button>'+
        '</div>';
      }).join('');
    }
  }

  if(curTab==='month'){
    document.getElementById('tab-info').textContent=monthSess.length+' sessions · '+fmtDec(mTot);
    var mv=document.getElementById('month-view');
    var html='<div class="card" style="margin-bottom:2px">'+
      '<div class="row" style="justify-content:space-between;margin-bottom:3px">'+
        '<span class="lbl">'+new Date().toLocaleDateString('en-US',{month:'long',year:'numeric'})+' — '+S.cfg.monthly+'h target</span>'+
        '<span class="mono" style="font-size:12px;color:'+(mExtra>0?'var(--green)':'var(--text2)')+'">'+
          (mExtra>0?'+'+fmtHM(mExtra)+' extra':fmtHM(Math.max(0,mTgt-mTot))+' left')+
        '</span>'+
      '</div>'+
      '<div class="bar-wrap"><div class="bar-fill" style="width:'+mPct+'%;background:'+(mExtra>0?'var(--green-dk)':'var(--blue)')+'"></div></div>'+
      '<div style="display:flex;gap:24px">';
    ['c1','c2'].forEach(function(id,i){
      var tot=ccSecs(id,monthSess);
      var col=id==='c1'?'#378ADD':'#1D9E75';
      html+='<div>'+
        '<div style="font-size:11px;color:var(--text2);margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+S.codes[i].name+'</div>'+
        '<div class="mono" style="font-size:20px;font-weight:500;color:'+col+'">'+fmtHM(tot)+'</div>'+
        '<div style="font-size:11px;color:var(--text2)">'+fmtDec(tot)+'</div>'+
      '</div>';
    });
    html+='</div></div>';
    var byDate={};
    monthSess.forEach(function(s){if(!byDate[s.date])byDate[s.date]=[];byDate[s.date].push(s);});
    Object.keys(byDate).sort().reverse().forEach(function(d){
      var ds=byDate[d];
      var dayTot=ds.reduce(function(a,s){return a+s.dur;},0);
      html+='<div class="card" style="margin-bottom:2px">'+
        '<div class="row" style="justify-content:space-between;margin-bottom:6px">'+
          '<span style="font-size:13px;font-weight:500">'+new Date(d+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})+'</span>'+
          '<span class="mono" style="font-size:13px">'+fmtHM(dayTot)+'</span>'+
        '</div>';
      ds.forEach(function(s){
        var col=s.cc==='c1'?'#378ADD':'#1D9E75';
        html+='<div class="sess-row">'+
          '<div style="width:3px;height:18px;border-radius:2px;background:'+col+';flex-shrink:0"></div>'+
          '<span style="font-size:12px;flex:1;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+ccName(s.cc)+' · '+s.loc+' · '+s.start+' – '+s.end+'</span>'+
          '<span class="mono" style="font-size:12px;margin-right:6px">'+fmtHM(s.dur)+'</span>'+
          '<button class="del-btn" onclick="delSession(\''+s.id+'\')">×</button>'+
        '</div>';
      });
      html+='</div>';
    });
    if(Object.keys(byDate).length===0) html+='<div class="card" style="text-align:center;font-size:13px;color:var(--text2);padding:1.5rem">no sessions this month yet</div>';
    mv.innerHTML=html;
  }
}

load();
</script>
</body>
</html>
